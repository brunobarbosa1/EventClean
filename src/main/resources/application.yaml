spring:
  application:
    name: EventClean

  datasource:
    url: jdbc:postgresql://localhost:5431/eventos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    jpa:
      jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true

        flyway:
          enabled: true
          locations: classpath:db/migration
